name: Build Mixtile Edge 2

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to build (main, port/<version>, or an immutable tag)
        required: true
        type: string
        default: main
      mode:
        description: Whether to only validate the build or publish a validated release
        required: true
        type: choice
        default: validate
        options:
          - validate
          - publish
      release_tag:
        description: Required in publish mode; must be mixtile-haos-<version>-rN
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      BR2_EXTERNAL_PATH: /build/haos/buildroot-external:/build/external
    steps:
      - name: Checkout source
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Ensure submodules
        run: git submodule update --init --recursive

      - name: Resolve source metadata
        id: source
        shell: bash
        run: |
          set -euo pipefail

          source_sha="$(git rev-parse HEAD)"
          haos_version="$(git -C haos describe --tags --exact-match 2>/dev/null || true)"
          echo "source_sha=${source_sha}" >> "$GITHUB_OUTPUT"
          echo "haos_version=${haos_version}" >> "$GITHUB_OUTPUT"

      - name: Validate release inputs
        if: ${{ inputs.mode == 'publish' || inputs.release_tag != '' }}
        shell: bash
        env:
          MODE: ${{ inputs.mode }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          HAOS_VERSION: ${{ steps.source.outputs.haos_version }}
        run: |
          set -euo pipefail

          if [[ "${MODE}" == "publish" && -z "${RELEASE_TAG}" ]]; then
            echo "release_tag is required in publish mode." >&2
            exit 1
          fi

          if [[ -z "${RELEASE_TAG}" ]]; then
            exit 0
          fi

          if [[ -z "${HAOS_VERSION}" ]]; then
            echo "Release builds require haos/ to be pinned to an exact upstream HAOS tag." >&2
            exit 1
          fi

          expected_pattern="^mixtile-haos-${HAOS_VERSION}-r[1-9][0-9]*$"
          if [[ ! "${RELEASE_TAG}" =~ ${expected_pattern} ]]; then
            echo "release_tag must match ${expected_pattern}" >&2
            exit 1
          fi

      - name: Free disk space
        run: |
          df -h
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h

      - name: Build Mixtile Edge 2 image
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$GITHUB_WORKSPACE/.cache" "$GITHUB_WORKSPACE/output"

          haos_tag="$(git -C "$GITHUB_WORKSPACE/haos" describe --tags --exact-match 2>/dev/null || git -C "$GITHUB_WORKSPACE/haos" rev-parse --short HEAD)"
          builder_image="mixtile-haos-builder:${haos_tag}"

          docker build \
            -t "$builder_image" \
            -f "$GITHUB_WORKSPACE/haos/Dockerfile" \
            "$GITHUB_WORKSPACE/haos"

          docker run --rm --privileged \
            -e BUILDER_UID="$(id -u)" \
            -e BUILDER_GID="$(id -g)" \
            -v "$GITHUB_WORKSPACE:/build" \
            -v "$GITHUB_WORKSPACE/.cache:/cache" \
            -v "$GITHUB_WORKSPACE/output:/build/output" \
            "$builder_image" \
            make -C /build/haos/buildroot O=/build/output BR2_EXTERNAL="${BR2_EXTERNAL_PATH}" mixtile_edge2_defconfig

          docker run --rm --privileged \
            -e BUILDER_UID="$(id -u)" \
            -e BUILDER_GID="$(id -g)" \
            -v "$GITHUB_WORKSPACE:/build" \
            -v "$GITHUB_WORKSPACE/.cache:/cache" \
            -v "$GITHUB_WORKSPACE/output:/build/output" \
            "$builder_image" \
            make -C /build/haos/buildroot O=/build/output BR2_EXTERNAL="${BR2_EXTERNAL_PATH}"

      - name: Upload image artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: mixtile-edge2-images
          path: |
            output/images/*.img.xz
            output/images/*.raucb

      - name: Upload release assets
        if: ${{ inputs.mode == 'publish' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GIT_REF: ${{ inputs.git_ref }}
          HAOS_VERSION: ${{ steps.source.outputs.haos_version }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail

          release_notes="$(mktemp)"
          {
            echo "Mixtile HAOS release for HAOS ${HAOS_VERSION}."
            echo
            echo "Git ref: \`${GIT_REF}\`"
            echo "Source commit: \`${{ steps.source.outputs.source_sha }}\`"
            echo "Upstream HAOS tag pinned in \`haos/\`: \`${HAOS_VERSION}\`"
          } > "${release_notes}"

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" output/images/*.img.xz output/images/*.raucb --clobber
            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_TAG}" \
              --notes-file "${release_notes}" \
              --verify-tag
          else
            gh release create "${RELEASE_TAG}" \
              output/images/*.img.xz \
              output/images/*.raucb \
              --title "${RELEASE_TAG}" \
              --notes-file "${release_notes}" \
              --verify-tag
          fi
