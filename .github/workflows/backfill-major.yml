name: Backfill major release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Historical HAOS major target; the matching port/<version> branch must already exist on origin
        required: true
        type: choice
        options:
          - "11.5"
          - "12.4"
          - "13.2"
          - "14.2"
          - "15.2"
          - "16.3"
          - "17.1"
      revision:
        description: Release revision number for the selected HAOS version
        required: true
        type: string
        default: "1"
      force:
        description: Rebuild even if the GitHub Release already exists
        required: true
        type: boolean
        default: false

jobs:
  validate:
    runs-on: ubuntu-22.04
    permissions:
      actions: write
      contents: read
    steps:
      - name: Resolve backfill inputs
        id: release
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          echo "git_ref=port/${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate source branch exists
        shell: bash
        env:
          GIT_REF: ${{ steps.release.outputs.git_ref }}
        run: |
          set -euo pipefail
          git ls-remote --exit-code --heads "https://github.com/${GITHUB_REPOSITORY}.git" "${GIT_REF}" >/dev/null

      - name: Check existing release
        id: existing
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          FORCE: ${{ inputs.force }}
          RELEASE_TAG: mixtile-haos-${{ inputs.version }}-r${{ inputs.revision }}
        run: |
          set -euo pipefail
          if [[ "${FORCE}" == "true" ]]; then
            echo "should_dispatch=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "should_dispatch=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_dispatch=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch build workflow
        if: ${{ steps.existing.outputs.should_dispatch == 'true' }}
        id: dispatch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GIT_REF: ${{ steps.release.outputs.git_ref }}
        run: |
          set -euo pipefail
          dispatched_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          gh workflow run build-release.yml \
            --ref main \
            -f git_ref="${GIT_REF}" \
            -f mode=validate

          run_id=""
          for _ in $(seq 1 30); do
            run_id="$(
              gh run list \
                --workflow build-release.yml \
                --event workflow_dispatch \
                --limit 10 \
                --json databaseId,createdAt \
                --jq "map(select(.createdAt >= \"${dispatched_at}\"))[0].databaseId"
            )"
            if [[ -n "${run_id}" && "${run_id}" != "null" ]]; then
              break
            fi
            sleep 10
          done

          if [[ -z "${run_id}" || "${run_id}" == "null" ]]; then
            echo "Unable to resolve the validation run id." >&2
            exit 1
          fi

          echo "run_id=${run_id}" >> "$GITHUB_OUTPUT"

      - name: Wait for validation result
        if: ${{ steps.existing.outputs.should_dispatch == 'true' }}
        id: result
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.dispatch.outputs.run_id }}
        run: |
          set -euo pipefail
          if gh run watch "${RUN_ID}" --exit-status; then
            echo "status=validated" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Write summary
        if: always()
        run: |
          {
            echo "# Backfill validation summary"
            echo ""
            echo "- Version: \`${{ inputs.version }}\`"
            echo "- Source branch: \`${{ steps.release.outputs.git_ref }}\`"
            echo "- Dispatched: \`${{ steps.existing.outputs.should_dispatch == 'true' }}\`"
            echo "- Validation run id: \`${{ steps.dispatch.outputs.run_id || 'n/a' }}\`"
            echo "- Validation status: \`${{ steps.result.outputs.status || 'skipped' }}\`"
            echo "- Requirement: prepare and push \`${{ steps.release.outputs.git_ref }}\` before running this workflow"
          } >> "$GITHUB_STEP_SUMMARY"
